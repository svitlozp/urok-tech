<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Назва Аніме - АнімеБаза</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body id="anime-detail-page">
    <header>
        <nav>
            <a href="index.html" class="logo">АнімеБаза</a>
            <ul>
                <li><a href="index.html">Головна</a></li>
                <li><a href="catalog.html">Каталог</a></li>
                <li><a href="community.html">Спільнота</a></li>
                <li><a href="profile.html">Профіль</a></li>
            </ul>
            <div id="auth-container">
                <button class="google-login-btn" id="google-login">
                    <img src="https://developers.google.com/identity/images/g-logo.png" alt="Google logo">
                    <span>Увійти через Google</span>
                </button>
            </div>
        </nav>
    </header>

    <main>
        <section id="anime-banner"><img id="banner-image" src="" alt="Banner"></section>
        
        <div id="anime-detail-content">
            <header id="anime-header">
                <div id="anime-poster">
                    <img id="poster-image" src="" alt="Poster">
                </div>
                <div id="anime-title-section">
                    <h1 id="anime-title">Завантаження...</h1>
                    <div id="anime-meta">
                        <span id="anime-type-year"></span>
                        <span id="anime-episodes"></span>
                        <span class="score" id="anime-score"></span>
                    </div>
                    <div id="anime-genres"></div>
                    <div id="anime-actions">
                        <button class="btn" id="add-to-list-btn">Додати до списку</button>
                        <button class="btn btn-secondary" id="write-review-btn">Написати відгук</button>
                    </div>
                </div>
            </header>

            <section id="anime-body">
                <div id="anime-description">
                    <h2>Опис</h2>
                    <p id="anime-description-text">Завантаження...</p>
                </div>
                <aside id="anime-trailer">
                    <h2>Трейлер</h2>
                    <div id="trailer-container"></div>
                </aside>
            </section>
        </div>
    </main>

    <footer>
        <p>&copy; 2024 Мій Аніме Сайт</p>
    </footer>
    <script src="js/anime-detail.js"></script>
</body>
</html>
