<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог - АнімеБаза</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="logo">АнімеБаза</a>
            <ul>
                <li><a href="index.html">Головна</a></li>
                <li><a href="catalog.html" class="active">Каталог</a></li>
                <li><a href="community.html">Спільнота</a></li>
                <li><a href="profile.html">Профіль</a></li>
            </ul>
            <div id="auth-container">
                <button class="google-login-btn" id="google-login">
                    <img src="https://developers.google.com/identity/images/g-logo.png" alt="Google logo">
                    Увійти через Google
                </button>
            </div>
        </nav>
    </header>

    <main id="catalog-page">
        <h2>Каталог Аніме</h2>

        <!-- Filter and Sort Controls -->
        <section id="filter-controls">
            <div class="filter-group">
                <input type="search" id="search-input" placeholder="Пошук за назвою...">
            </div>
            <div class="filter-group">
                <label for="genre-filter">Жанр:</label>
                <select id="genre-filter"></select>
            </div>
            <div class="filter-group">
                <label for="status-filter">Статус:</label>
                <select id="status-filter">
                    <option value="">Всі</option>
                    <option value="anons">Анонс</option>
                    <option value="ongoing">Онгоінг</option>
                    <option value="released">Вийшло</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="sort-filter">Сортувати за:</label>
                <select id="sort-filter">
                    <option value="ranked">Рейтингом</option>
                    <option value="popularity">Популярністю</option>
                    <option value="name">Назвою (A-Z)</option>
                </select>
            </div>
        </section>

        <div id="catalog-grid" class="anime-grid">
            <p>Завантаження...</p>
        </div>
    </main>

    <footer>
        <p>&copy; 2024 Мій Аніме Сайт</p>
    </footer>
    <script src="js/catalog.js"></script>
</body>
</html>
