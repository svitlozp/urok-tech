<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мій Профіль - АнімеБаза</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="logo">АнімеБаза</a>
            <ul>
                <li><a href="index.html">Головна</a></li>
                <li><a href="catalog.html">Каталог</a></li>
                <li><a href="community.html">Спільнота</a></li>
                <li><a href="profile.html" class="active">Профіль</a></li>
            </ul>
            <div id="auth-container">
                <button class="google-login-btn" id="google-login">
                    <img src="https://developers.google.com/identity/images/g-logo.png" alt="Google logo">
                    Увійти через Google
                </button>
            </div>
        </nav>
    </header>

    <main id="profile-page">
        <div id="profile-page-grid">
            <!-- Left Sidebar -->
            <aside id="profile-sidebar">
                <div class="profile-avatar">
                    <img src="https://i.pravatar.cc/150?u=a042581f4e29026704d" alt="Avatar">
                </div>
                <div class="profile-details">
                    <h1>User_Name</h1>
                    <p class="join-date">Приєднався: Січень 2024</p>
                    <div class="profile-stats">
                        <div class="stat">
                            <div class="stat-value">10</div>
                            <div class="stat-label">У списку</div>
                        </div>
                        <div class="stat">
                            <div class="stat-value">120</div>
                            <div class="stat-label">Годин</div>
                        </div>
                        <div class="stat">
                            <div class="stat-value">5</div>
                            <div class="stat-label">Друзів</div>
                        </div>
                    </div>
                    <button class="edit-profile-btn">Редагувати профіль</button>
                </div>
            </aside>

            <!-- Right Content -->
            <div id="profile-content">
                <div class="tabs">
                    <button class="tab-button active" data-list="watching">Дивлюся</button>
                    <button class="tab-button" data-list="completed">Переглянуто</button>
                    <button class="tab-button" data-list="planned">Заплановано</button>
                </div>

                <div id="watching-list" class="list-content active">
                    <div class="anime-grid">
                        <!-- Content will be dynamically loaded by JavaScript -->
                        <p>Завантаження...</p>
                    </div>
                </div>

                <div id="completed-list" class="list-content">
                     <div class="anime-grid">
                        <p>Цей список поки порожній.</p>
                    </div>
                </div>

                <div id="planned-list" class="list-content">
                    <div class="anime-grid">
                        <p>Цей список поки порожній.</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2024 Мій Аніме Сайт</p>
    </footer>
    <script src="js/profile.js"></script>
</body>
</html>
