<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профіль - АнімеБаза</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="logo">АнімеБаза</a>
            <ul>
                <li><a href="index.html">Головна</a></li>
                <li><a href="catalog.html">Каталог</a></li>
                <li><a href="community.html">Спільнота</a></li>
                <li><a href="profile.html" class="active">Профіль</a></li>
            </ul>
            <div id="auth-container">
                <button class="google-login-btn" id="google-login">
                    <img src="https://developers.google.com/identity/images/g-logo.png" alt="Google logo">
                    <span>Увійти через Google</span>
                </button>
            </div>
        </nav>
    </header>

    <main>
        <div id="profile-page-grid">
            <!-- Sidebar with Profile Info -->
            <aside id="profile-sidebar">
                <div class="profile-avatar">
                    <img src="https://via.placeholder.com/150" alt="User Avatar" id="user-avatar">
                </div>
                <div class="profile-details">
                    <h1 id="user-name">Username</h1>
                    <p class="join-date" id="user-join-date">Приєднався: 2024</p>
                </div>
                <div class="profile-stats">
                    <div class="stat">
                        <div class="stat-value" id="planned-count">0</div>
                        <div class="stat-label">Планую</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value" id="watching-count">0</div>
                        <div class="stat-label">Дивлюся</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value" id="completed-count">0</div>
                        <div class="stat-label">Переглянуто</div>
                    </div>
                </div>
                <button class="btn" id="edit-profile-btn">Редагувати профіль</button>
            </aside>

            <!-- Main Content with Anime Lists -->
            <section id="profile-content">
                <div class="tabs">
                    <button class="tab-button active" data-list="planned">Планую</button>
                    <button class="tab-button" data-list="watching">Дивлюся</button>
                    <button class="tab-button" data-list="completed">Переглянуто</button>
                    <button class="tab-button" data-list="dropped">Кинуто</button>
                </div>

                <div id="planned-list" class="list-content active">
                    <h2>Планую подивитися</h2>
                    <div class="anime-grid" id="planned-grid">
                        <!-- Anime cards will be dynamically inserted here -->
                    </div>
                </div>

                <div id="watching-list" class="list-content">
                    <h2>Зараз дивлюся</h2>
                    <div class="anime-grid" id="watching-grid">
                         <!-- Anime cards will be dynamically inserted here -->
                    </div>
                </div>

                <div id="completed-list" class="list-content">
                    <h2>Переглянуті аніме</h2>
                    <div class="anime-grid" id="completed-grid">
                         <!-- Anime cards will be dynamically inserted here -->
                    </div>
                </div>
                
                <div id="dropped-list" class="list-content">
                    <h2>Кинуті аніме</h2>
                    <div class="anime-grid" id="dropped-grid">
                        <!-- Anime cards will be dynamically inserted here -->
                    </div>
                </div>
            </section>
        </div>
    </main>

    <footer>
        <p>&copy; 2024 Мій Аніме Сайт</p>
    </footer>
    <script src="js/profile.js"></script>
</body>
</html>
